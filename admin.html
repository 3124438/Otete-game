<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Game Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --card: #1a2035; --border: rgba(255,255,255,.08);
      --accent: #00d4ff; --accent2: #7b8cde; --danger: #ff4d6d; --success: #00e5a0;
      --text: #fff; --muted: rgba(255,255,255,.45); --input-bg: rgba(255,255,255,.05);
    }
    body { background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: var(--text); min-height: 100vh; padding-bottom: 60px; }

    header {
      background: linear-gradient(135deg,#0d1224,#111827);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; }
    .logo-text { font-size: 14px; font-weight: 700; }
    .logo-sub  { font-size: 11px; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; }
    .live-dot  { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 7px var(--success); animation: blink 2s infinite; }
    .dot.err  { background: var(--danger);  box-shadow: 0 0 7px var(--danger);  animation: none; }
    .dot.idle { background: var(--muted);   box-shadow: none; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .main { max-width: 1080px; margin: 0 auto; padding: 24px 16px 0; display: flex; flex-direction: column; gap: 16px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .card-title-row { display: flex; align-items: center; gap: 9px; }
    .card-icon { width: 26px; height: 26px; border-radius: 7px; background: rgba(0,212,255,.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-title { font-size: 12px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--accent); }
    .card-body  { padding: 18px; }

    .gas-form { display: flex; gap: 10px; }
    .gas-form input {
      flex: 1; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-family: inherit;
      font-size: 13px; padding: 9px 13px; outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .gas-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }
    .btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 9px; color: #0a0e1a; font-family: inherit; font-size: 13px; font-weight: 700; padding: 9px 18px; cursor: pointer; white-space: nowrap; transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn-sm { background: rgba(255,255,255,.07); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 6px 12px; border-radius: 7px; cursor: pointer; font-family: inherit; font-weight: 500; transition: border-color .2s, background .2s; }
    .btn-sm:hover { border-color: var(--accent); background: rgba(0,212,255,.08); color: var(--accent); }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 14px; font-weight: 500; }
    .toggle-desc  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .toggle { position: relative; width: 42px; height: 23px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,.1); border-radius: 999px; cursor: pointer; transition: background .25s; }
    .toggle-slider::after { content: ''; position: absolute; width: 17px; height: 17px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: transform .25s; }
    .toggle input:checked + .toggle-slider { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .toggle input:checked + .toggle-slider::after { transform: translateX(19px); }

    /* ゲーム設定グリッド */
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .setting-item { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .setting-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .setting-value { font-size: 20px; font-weight: 700; margin-top: 4px; color: var(--accent); }
    .setting-unit { font-size: 12px; color: var(--muted); font-weight: 400; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { transition: background .15s; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody tr.disabled-row { opacity: .4; }
    tbody td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }

    .media-preview { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: rgba(255,255,255,.06); border: 1px solid var(--border); vertical-align: middle; }
    .url-cell { font-size: 11px; color: var(--muted); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .type-badge { display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; letter-spacing: .04em; text-transform: uppercase; }
    .type-badge.image { background: rgba(0,212,255,.15); color: var(--accent); }
    .type-badge.video { background: rgba(123,140,222,.2); color: var(--accent2); }

    .hand-badge { display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; letter-spacing: .04em; }
    .hand-badge.both  { background: rgba(123,140,222,.18); color: var(--accent2); }
    .hand-badge.right { background: rgba(0,212,255,.14);   color: var(--accent); }
    .hand-badge.left  { background: rgba(0,229,160,.14);   color: var(--success); }

    .chip { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; }
    .chip.extended { background: rgba(0,212,255,.18);  color: var(--accent); }
    .chip.bent     { background: rgba(255,77,109,.18); color: var(--danger); }
    .chip.ignore   { background: rgba(255,255,255,.07); color: var(--muted); }

    .num-cell { font-size: 13px; font-weight: 600; white-space: nowrap; }
    .num-unit { font-size: 11px; color: var(--muted); font-weight: 400; }

    .cb-wrap { display: flex; justify-content: center; align-items: center; }
    .cb-custom { width: 18px; height: 18px; border-radius: 5px; cursor: pointer; border: 1.5px solid var(--border); background: var(--input-bg); display: flex; align-items: center; justify-content: center; transition: border-color .2s, background .2s; flex-shrink: 0; }
    .cb-custom.checked { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; }
    .cb-custom.checked svg { display: block; }
    .cb-custom svg { display: none; }

    .badge { background: rgba(0,212,255,.12); color: var(--accent); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
    .last-updated { font-size: 11px; color: var(--muted); }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--card); border: 1px solid var(--accent); border-radius: 10px; color: var(--accent); font-size: 13px; font-weight: 500; padding: 9px 18px; opacity: 0; pointer-events: none; z-index: 999; transition: opacity .25s, transform .25s; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    a.open-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; transition: opacity .2s; }
    a.open-link:hover { opacity: .7; }

    .skeleton-source { font-size: 10px; color: var(--muted); margin-top: 3px; font-style: italic; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/>
        <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/>
        <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/>
        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Gesture Game Admin</div>
      <div class="logo-sub">Spreadsheet Connected</div>
    </div>
  </div>
  <div class="live-dot">
    <div class="dot idle" id="sync-dot"></div>
    <span id="sync-label">未接続</span>
  </div>
</header>

<main class="main">

  <!-- GAS URL -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <div class="card-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </div>
        <div class="card-title">GAS エンドポイント</div>
      </div>
      <a class="open-link" href="game_display.html" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        ゲーム画面を開く
      </a>
    </div>
    <div class="card-body">
      <div class="gas-form">
        <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/..." spellcheck="false">
        <button class="btn" onclick="saveAndFetch()">接続・取得</button>
      </div>
      <div style="margin-top:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <button class="btn-sm" onclick="fetchNow()">↺ 今すぐ更新</button>
        <span class="last-updated" id="last-updated">最終取得: -</span>
      </div>
    </div>
  </div>

  <!-- ゲーム設定（読み取り専用サマリ：Q3/Q4/Q5） -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <div class="card-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </div>
        <div class="card-title">ゲーム設定（スプシ Q3〜Q5）</div>
      </div>
    </div>
    <div class="card-body">
      <div class="settings-grid">
        <div class="setting-item">
          <div class="setting-label">初期制限時間</div>
          <div class="setting-value" id="setting-time">- <span class="setting-unit">秒</span></div>
        </div>
        <div class="setting-item">
          <div class="setting-label">落下速度上限</div>
          <div class="setting-value" id="setting-maxspeed">-</div>
        </div>
        <div class="setting-item">
          <div class="setting-label">速度上昇率</div>
          <div class="setting-value" id="setting-rate">- <span class="setting-unit">%</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 骨格表示 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <div class="card-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="card-title">骨格表示</div>
      </div>
    </div>
    <div class="card-body">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">スケルトン表示</div>
          <div class="toggle-desc">このトグルはスプシのO2より優先されます</div>
          <div class="skeleton-source" id="skeleton-source">現在の値: スプシ未取得</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="show-skeleton" onchange="onSkeletonToggle()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- ジェスチャーテーブル -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <div class="card-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </div>
        <div class="card-title">ジェスチャー設定 <span class="badge" id="row-count">0</span></div>
      </div>
      <span class="last-updated">スプレッドシートから読み込み</span>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table id="gesture-table">
          <thead>
            <tr>
              <th>有効</th>
              <th>種別</th>
              <th>プレビュー</th>
              <th>メディアURL</th>
              <th>音声URL</th>
              <th>Pt</th>
              <th>速度</th>
              <th>大きさ</th>
              <th>頻度</th>
              <th>対象の手</th>
              <th>親指</th><th>人差し</th><th>中指</th><th>薬指</th><th>小指</th>
            </tr>
          </thead>
          <tbody id="gesture-tbody">
            <tr><td colspan="15" class="empty">GASのURLを入力して「接続・取得」を押してください</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
const LS_KEY_URL = 'gas_url';
let gasUrl      = localStorage.getItem(LS_KEY_URL) || '';
let allGestures = [];

const channel = new BroadcastChannel('hand-gesture-channel');

window.addEventListener('DOMContentLoaded', () => {
  const urlInput = document.getElementById('gas-url-input');
  if (gasUrl) { urlInput.value = gasUrl; fetchNow(); }
});

// ================================================================
//  GAS URL保存→取得
// ================================================================
function saveAndFetch() {
  const v = document.getElementById('gas-url-input').value.trim();
  if (!v) { showToast('URLを入力してください'); return; }
  gasUrl = v;
  localStorage.setItem(LS_KEY_URL, gasUrl);
  fetchNow();
}

async function fetchNow() {
  if (!gasUrl) return;
  setDot('idle', '取得中...');
  try {
    const res  = await fetch(gasUrl, { cache: 'no-store' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allGestures = data.gestures || [];

    if (!skeletonManuallyChanged) {
      document.getElementById('show-skeleton').checked = !!data.showSkeleton;
      updateSkeletonSource('スプシ O2 より取得');
    }

    if (data.gameSettings) {
      document.getElementById('setting-time').innerHTML = data.gameSettings.initialTime + ' <span class="setting-unit">秒</span>';
      document.getElementById('setting-maxspeed').textContent = data.gameSettings.maxFallSpeed;
      document.getElementById('setting-rate').innerHTML = data.gameSettings.speedUpRate + ' <span class="setting-unit">%</span>';
    }

    renderTable(allGestures);
    broadcastConfig();
    setDot('ok', '同期済み');
    document.getElementById('last-updated').textContent = '最終取得: ' + new Date().toLocaleTimeString('ja-JP');
    document.getElementById('row-count').textContent = allGestures.length;
    showToast('取得完了 (' + (data.enabled || 0) + '件有効)');
  } catch (e) {
    console.error(e);
    setDot('err', 'エラー');
    showToast('取得エラー: ' + e.message.slice(0, 40));
  }
}

// ================================================================
//  骨格トグル
// ================================================================
let skeletonManuallyChanged = false;

function onSkeletonToggle() {
  skeletonManuallyChanged = true;
  updateSkeletonSource('手動で変更（スプシより優先）');
  broadcastConfig();
}

function updateSkeletonSource(msg) {
  document.getElementById('skeleton-source').textContent = '現在の値: ' + msg;
}

// ================================================================
//  BroadcastChannel 送信
// ================================================================
function broadcastConfig() {
  const showSkeleton = document.getElementById('show-skeleton').checked;
  channel.postMessage({
    type: 'config',
    payload: {
      showSkeletonOverride: showSkeleton,
      gestures: allGestures
    }
  });
}

// ================================================================
//  テーブル描画
// ================================================================
const FINGER_KEYS = ['thumb','index','middle','ring','pinky'];

function renderTable(gestures) {
  const tbody = document.getElementById('gesture-tbody');
  if (!gestures.length) {
    tbody.innerHTML = '<tr><td colspan="15" class="empty">データがありません</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  gestures.forEach((g, i) => {
    const tr = document.createElement('tr');
    if (!g.enabled) tr.classList.add('disabled-row');

    // 有効チェックボックス
    const tdCb = document.createElement('td');
    const cbWrap = document.createElement('div'); cbWrap.className = 'cb-wrap';
    const cb = document.createElement('div');
    cb.className = 'cb-custom' + (g.enabled ? ' checked' : '');
    cb.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
    cb.onclick = () => toggleRow(i, g.rowIndex, cb, tr);
    cbWrap.appendChild(cb); tdCb.appendChild(cbWrap); tr.appendChild(tdCb);

    // 種別バッジ
    const tdType = document.createElement('td');
    const t = g.mediaType || 'image';
    tdType.innerHTML = '<span class="type-badge ' + t + '">' + (t === 'video' ? '動画' : '画像') + '</span>';
    tr.appendChild(tdType);

    // プレビュー
    const tdPrev = document.createElement('td');
    if (g.mediaUrl) {
      if (t === 'video') {
        const v = document.createElement('video');
        v.className = 'media-preview'; v.src = g.mediaUrl; v.muted = true;
        tdPrev.appendChild(v);
      } else {
        const img = document.createElement('img');
        img.className = 'media-preview'; img.src = g.mediaUrl;
        img.onerror = () => { img.style.display = 'none'; };
        tdPrev.appendChild(img);
      }
    }
    tr.appendChild(tdPrev);

    // メディアURL
    const tdUrl = document.createElement('td');
    tdUrl.className = 'url-cell'; tdUrl.title = g.mediaUrl; tdUrl.textContent = g.mediaUrl || '-';
    tr.appendChild(tdUrl);

    // 音声URL
    const tdAudio = document.createElement('td');
    tdAudio.className = 'url-cell'; tdAudio.title = g.audioUrl || ''; tdAudio.textContent = g.audioUrl || '-';
    tr.appendChild(tdAudio);

    // ポイント
    const tdPt = document.createElement('td');
    tdPt.className = 'num-cell'; tdPt.textContent = g.point;
    tr.appendChild(tdPt);

    // 落下速度
    const tdSpeed = document.createElement('td');
    tdSpeed.className = 'num-cell'; tdSpeed.textContent = g.fallSpeed;
    tr.appendChild(tdSpeed);

    // 大きさ
    const tdSize = document.createElement('td');
    tdSize.className = 'num-cell'; tdSize.innerHTML = g.size + ' <span class="num-unit">px</span>';
    tr.appendChild(tdSize);

    // 出現頻度
    const tdFreq = document.createElement('td');
    tdFreq.className = 'num-cell'; tdFreq.innerHTML = g.frequency + ' <span class="num-unit">%</span>';
    tr.appendChild(tdFreq);

    // 対象の手
    const tdHand = document.createElement('td');
    const hClass = g.targetHand === 'Right' ? 'right' : g.targetHand === 'Left' ? 'left' : 'both';
    const hLabel = g.targetHand === 'Right' ? '右手' : g.targetHand === 'Left' ? '左手' : '両手';
    tdHand.innerHTML = '<span class="hand-badge ' + hClass + '">' + hLabel + '</span>';
    tr.appendChild(tdHand);

    // 各指
    FINGER_KEYS.forEach(fk => {
      const td = document.createElement('td');
      const val = g.fingers[fk];
      const cls = val === 'Extended' ? 'extended' : val === 'Bent' ? 'bent' : 'ignore';
      const lbl = val === 'Extended' ? '伸' : val === 'Bent' ? '曲' : '－';
      td.innerHTML = '<span class="chip ' + cls + '">' + lbl + '</span>';
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

// ================================================================
//  チェックボックス書き戻し
// ================================================================
async function toggleRow(localIdx, rowIndex, cbEl, trEl) {
  const g = allGestures[localIdx];
  g.enabled = !g.enabled;
  cbEl.classList.toggle('checked', g.enabled);
  trEl.classList.toggle('disabled-row', !g.enabled);
  broadcastConfig();
  if (gasUrl && rowIndex) {
    try {
      const res = await fetch(gasUrl + '?action=toggle&row=' + rowIndex + '&enabled=' + g.enabled, { cache: 'no-store' });
      const d   = await res.json();
      if (d.success) showToast((g.enabled ? '有効' : '無効') + 'にしました (行 ' + rowIndex + ')');
    } catch(e) { showToast('書き戻しエラー'); }
  }
}

// ================================================================
//  UI helpers
// ================================================================
function setDot(state, label) {
  document.getElementById('sync-dot').className = 'dot ' + (state === 'ok' ? '' : state);
  document.getElementById('sync-label').textContent = label;
}
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
